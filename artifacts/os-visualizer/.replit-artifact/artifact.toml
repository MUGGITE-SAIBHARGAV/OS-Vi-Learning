kind = "web"
previewPath = "/"
title = "OS Visualizer"
version = "1.0.0"
id = "artifacts/os-visualizer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19371

[services.development]
run = "pnpm --filter @workspace/os-visualizer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/os-visualizer", "run", "build" ]
publicDir = "artifacts/os-visualizer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19371"
BASE_PATH = "/"
